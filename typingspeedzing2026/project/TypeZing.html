<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TypeZing — AI Typing Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============ TOKENS ============ */
:root{
  --radius: 12px;
  --primary:#f59e0b; --primary-foreground:#1a1206;
  --glow:0.6;
  --font-mono:'Geist Mono','Noto Sans Thai',ui-monospace,monospace;
}
.root[data-theme="light"]{
  --bg:oklch(0.995 0.002 95); --fg:oklch(0.18 0.01 70);
  --card:oklch(1 0 0); --card-2:oklch(0.985 0.003 95);
  --muted:oklch(0.96 0.004 95); --muted-fg:oklch(0.55 0.01 80);
  --border:oklch(0.9 0.006 90); --border-strong:oklch(0.84 0.008 90);
  --dim:oklch(0.78 0.008 85); --bad:#dc2626; --shadow:0 1px 3px rgba(20,15,5,.07),0 8px 30px -12px rgba(20,15,5,.12);
}
.root[data-theme="dark"]{
  --bg:oklch(0.16 0.006 70); --fg:oklch(0.96 0.004 90);
  --card:oklch(0.205 0.007 70); --card-2:oklch(0.235 0.008 70);
  --muted:oklch(0.27 0.008 70); --muted-fg:oklch(0.66 0.01 80);
  --border:oklch(0.31 0.01 70); --border-strong:oklch(0.4 0.012 70);
  --dim:oklch(0.42 0.01 75); --bad:#f87171; --shadow:0 1px 3px rgba(0,0,0,.4),0 18px 50px -18px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font-family:'Geist','Noto Sans Thai',system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}

.root{position:relative;min-height:100vh;height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--fg);overflow:hidden;transition:background .4s ease,color .3s ease}

/* ============ GLOW / DIRECTIONS ============ */
.glow-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.glow-orb{position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:1100px;height:620px;border-radius:50%;filter:blur(120px);opacity:calc(var(--glow)*0.5);transition:opacity .4s}
.root[data-dir="minimal"] .glow-orb{opacity:calc(var(--glow)*0.16);width:800px;filter:blur(150px)}
.root[data-dir="aurora"] .glow-layer::after{content:"";position:absolute;inset:0;background:
  radial-gradient(60% 50% at 18% 12%, color-mix(in oklch,var(--primary) 22%, transparent), transparent 70%),
  radial-gradient(50% 45% at 85% 30%, color-mix(in oklch,var(--primary) 14%, transparent), transparent 70%);
  opacity:var(--glow);mix-blend-mode:screen}
.root[data-theme="light"][data-dir="aurora"] .glow-layer::after{mix-blend-mode:multiply;opacity:calc(var(--glow)*0.6)}
.root[data-dir="terminal"] .glow-orb{opacity:calc(var(--glow)*0.22)}
.root[data-dir="terminal"] .glow-layer::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:38px 38px;opacity:.4;mask-image:radial-gradient(120% 90% at 50% 0%,#000,transparent 75%)}

.root>*{position:relative;z-index:1}

/* ============ TOPBAR ============ */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;gap:16px}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{display:grid;place-items:center;width:34px;height:34px;border-radius:9px;color:var(--primary-foreground);font-size:18px;box-shadow:0 6px 20px -6px color-mix(in oklch,var(--primary) 70%,transparent)}
.brand-name{font-weight:800;font-size:20px;letter-spacing:-.02em}
.brand-tag{font-size:11px;color:var(--muted-fg);border:1px solid var(--border);border-radius:99px;padding:3px 10px;letter-spacing:.04em;text-transform:uppercase;font-weight:500}
.top-actions{display:flex;align-items:center;gap:8px}
.seg-mini{font-size:13px;font-weight:600;color:var(--muted-fg);padding:7px 12px;border-radius:8px;border:1px solid transparent;transition:.15s}
.seg-mini:hover{color:var(--fg);background:var(--muted)}
.seg-mini.on{color:var(--fg);background:var(--card);border-color:var(--border);box-shadow:var(--shadow)}
.divider-v{width:1px;height:20px;background:var(--border)}
.icon-btn{display:grid;place-items:center;width:36px;height:36px;border-radius:9px;border:1px solid var(--border);color:var(--muted-fg);font-size:16px;transition:.15s;background:var(--card)}
.icon-btn:hover{color:var(--fg);border-color:var(--border-strong);transform:translateY(-1px)}

/* ============ MODE BAR ============ */
.mode-bar{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;padding:6px 28px 4px}
.seg{display:flex;gap:4px;padding:5px;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow)}
.seg-btn{display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--muted-fg);transition:.16s}
.seg-btn:hover{color:var(--fg);background:var(--muted)}
.seg-btn.on{color:var(--primary-foreground);background:var(--primary);box-shadow:0 6px 18px -6px color-mix(in oklch,var(--primary) 60%,transparent)}
.seg-icon{font-size:14px;opacity:.9}
.ctx{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:5px;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);min-height:48px}
.chip{font-size:13px;font-weight:600;color:var(--muted-fg);padding:8px 13px;border-radius:9px;transition:.15s}
.chip:hover{color:var(--fg);background:var(--muted)}
.chip.on{color:var(--fg);background:var(--muted);box-shadow:inset 0 0 0 1px var(--border-strong)}
.race-ctl{display:flex;gap:6px}
.ai-ctl{display:flex;gap:8px;align-items:center}
.ai-input{background:var(--muted);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--fg);width:230px;outline:none;transition:.15s}
.ai-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in oklch,var(--primary) 22%,transparent)}
.ai-input::placeholder{color:var(--muted-fg)}
.gen-btn{font-size:13px;font-weight:700;padding:8px 14px;border-radius:9px;transition:.15s;white-space:nowrap}
.gen-btn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.gen-btn:disabled{opacity:.6;cursor:default}

/* ============ STAGE / ENGINE ============ */
.stage{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:10px 28px;min-height:0}
.engine{width:100%;max-width:1080px;display:flex;flex-direction:column;gap:18px}
.stat-bar{display:flex;align-items:center;gap:22px;padding:0 4px}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-grow{flex:1;height:46px;justify-content:center}
.stat-val{font-size:30px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1}
.stat-lbl{font-size:11px;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.spark{width:100%;height:46px;display:block}
.spark-empty{font-size:11.5px;color:var(--muted-fg);text-align:right;font-family:var(--font-mono)}

.prog-track{height:3px;border-radius:99px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .15s linear}

.type-area{position:relative;font-family:var(--font-mono);font-size:30px;line-height:1.7;height:calc(30px*1.7*3);overflow:hidden;letter-spacing:.01em;cursor:text;user-select:none}
.type-area.lang-th{font-size:30px;line-height:1.85;height:calc(30px*1.85*3)}
.words-inner{transition:transform .18s ease}
.ch{color:var(--dim);transition:color .08s}
.ch-ok{color:var(--fg)}
.ch-bad{color:var(--bad);text-decoration:underline;text-decoration-color:var(--bad);text-underline-offset:3px}
.ch-bad:where(:not(.ch-ok)){background:color-mix(in oklch,var(--bad) 12%,transparent);border-radius:3px}
.caret{position:absolute;left:0;top:0;width:2.5px;border-radius:2px;will-change:transform;transition:transform .09s cubic-bezier(.2,.8,.3,1);animation:blink 1.1s steps(1) infinite;box-shadow:0 0 10px color-mix(in oklch,var(--primary) 80%,transparent)}
@keyframes blink{0%,55%{opacity:1}56%,100%{opacity:.15}}

/* ============ KEYBOARD ============ */
.kbd{display:flex;flex-direction:column;gap:6px;align-items:center;margin-top:4px;user-select:none}
.kbd-row{display:flex;gap:6px;width:100%;max-width:780px}
.kbd-key{position:relative;flex:1;min-width:0;aspect-ratio:1.18;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:var(--card);border:1px solid var(--border);border-bottom-width:2px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted-fg);transition:transform .07s,background .12s,border-color .12s,box-shadow .12s}
.kbd-main{font-size:14px;line-height:1}
.kbd-sub{font-size:9px;opacity:.55;line-height:1}
.kbd-mod{flex:1.3;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--dim);font-weight:600}
.kbd-row-space{max-width:520px}
.kbd-space{flex:1;aspect-ratio:auto;height:34px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
.kbd-next{color:var(--primary-foreground);background:var(--primary);border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in oklch,var(--primary) 28%,transparent),0 8px 22px -8px color-mix(in oklch,var(--primary) 80%,transparent);transform:translateY(-2px)}
.kbd-next .kbd-sub{opacity:.7}
.kbd-active{transform:translateY(1px) scale(.96);border-bottom-width:1px}
.kbd-heat{background:color-mix(in oklch,var(--bad) calc(var(--heat)*55%),var(--card));border-color:color-mix(in oklch,var(--bad) calc(var(--heat)*60%),var(--border));color:color-mix(in oklch,var(--bad) calc(var(--heat)*90%),var(--muted-fg))}

/* ============ RESULT ============ */
.result{width:100%;max-width:980px;display:flex;flex-direction:column;gap:20px;opacity:1;animation:rise .35s ease both}
@keyframes rise{from{transform:translateY(14px)}to{transform:none}}
.result-head{display:flex;align-items:center;justify-content:space-between}
.result-title{font-size:15px;color:var(--muted-fg);font-weight:600}
.result-mode{color:var(--fg)}
.pb-badge{font-size:12px;font-weight:700;border:1px solid;border-radius:99px;padding:5px 12px;letter-spacing:.02em}
.result-grid{display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:center}
.result-left{display:flex;flex-direction:column;gap:14px}
.rstat-val{font-size:64px;font-weight:800;letter-spacing:-.04em;line-height:.95;font-variant-numeric:tabular-nums}
.result-left .rstat:nth-child(2) .rstat-val{font-size:38px;color:var(--muted-fg)}
.rstat-sub{font-size:12px;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:4px}
.result-chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.rchart{width:100%;height:200px;display:block}
.rchart-empty{display:grid;place-items:center;height:200px;color:var(--muted-fg);font-size:13px}
.rgrid{stroke:var(--border);stroke-width:1}
.rgridtxt{fill:var(--muted-fg);font-size:9px;font-family:var(--font-mono)}
.result-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.result-row .rstat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.result-row .rstat-val{font-size:28px}
.result-actions{display:flex;gap:10px;justify-content:center;margin-top:4px}
.btn-primary{font-size:14px;font-weight:700;padding:12px 22px;border-radius:10px;transition:.15s;box-shadow:0 8px 22px -8px color-mix(in oklch,var(--primary) 70%,transparent)}
.btn-primary:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn-ghost{font-size:14px;font-weight:600;padding:12px 18px;border-radius:10px;border:1px solid var(--border);color:var(--muted-fg);transition:.15s}
.btn-ghost:hover{color:var(--fg);border-color:var(--border-strong)}

/* ============ HISTORY ============ */
.hist-bar{display:flex;align-items:center;gap:22px;padding:14px 28px;border-top:1px solid var(--border);background:color-mix(in oklch,var(--card) 60%,transparent);backdrop-filter:blur(8px)}
.hist-best{display:flex;align-items:baseline;gap:7px}
.hist-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-fg);font-weight:600}
.hist-val{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
.hist-unit{font-size:12px;color:var(--muted-fg)}
.hist-list{display:flex;gap:8px;overflow-x:auto;flex:1}
.hist-empty{font-size:12.5px;color:var(--muted-fg);font-family:var(--font-mono)}
.hist-item{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px 12px;min-width:78px}
.hi-wpm{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.hi-meta{font-size:10px;color:var(--muted-fg);white-space:nowrap}

/* terminal dir tweaks */
.root[data-dir="terminal"]{--radius:4px}
.root[data-dir="terminal"] .seg,.root[data-dir="terminal"] .ctx,.root[data-dir="terminal"] .kbd-key,.root[data-dir="terminal"] .chip,.root[data-dir="terminal"] .seg-btn,.root[data-dir="terminal"] .icon-btn,.root[data-dir="terminal"] .seg-mini,.root[data-dir="terminal"] .result-chart-wrap,.root[data-dir="terminal"] .result-row .rstat,.root[data-dir="terminal"] .hist-item{border-radius:4px}
.root[data-dir="terminal"] *{--font-mono:'Geist Mono','Noto Sans Thai',monospace}
.root[data-dir="terminal"] .brand-name,.root[data-dir="terminal"] .stat-val,.root[data-dir="terminal"] .rstat-val{font-family:'Geist Mono',monospace}
.root[data-dir="terminal"] .type-area{border:1px solid var(--border);border-radius:6px;padding:18px 20px;background:color-mix(in oklch,var(--card) 50%,transparent)}
.root[data-dir="terminal"] .type-area{height:calc(30px*1.7*3 + 36px)}

/* aurora glass */
.root[data-dir="aurora"] .seg,.root[data-dir="aurora"] .ctx{background:color-mix(in oklch,var(--card) 75%,transparent);backdrop-filter:blur(12px)}
.root[data-dir="aurora"] .result-chart-wrap,.root[data-dir="aurora"] .result-row .rstat{background:color-mix(in oklch,var(--card) 80%,transparent);backdrop-filter:blur(10px)}

@media (max-width:880px){
  .result-grid{grid-template-columns:1fr}
  .seg-txt{display:none}
  .ai-input{width:150px}
  .kbd-sub{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/keyboard.jsx"></script>
<script type="text/babel" src="src/engine.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
